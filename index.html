<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assignment #9: Giphy API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link href = "./css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container my-5">
      <h1 class="mb-4 text-center">Fetch a Gif</h1>
      <!-- Stretch: Add search functionality by commenting out the <div> element below -->

      <div class="row justify-content-center mb-3">
        <div class="col-md-6">
          <input type="text" id="search-input" class="form-control" placeholder="Search for a GIF">
        </div>
      </div>
      

      <div class="d-flex justify-content-center mb-4 gap-2">
        <button id="fetch-gif-btn" class="btn btn-primary">Fetch a GIF</button>
        <button id="toggle-gifs-btn" class="btn btn-secondary">Pause GIFs</button>
      </div>

      <div id="gif-container" class="row">
        <img class="animated-gif" src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExdW9za3NlMXFsdWUwanJ5MmlmaHlqOHR4cDZrODdoMTk0MzA1d2Y2YiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/kC8N6DPOkbqWTxkNTe/giphy.gif">
        <img class="animated-gif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbjgyZTFtN3VpMWRqZTc1MmFqcHY5c2ZveXBsYnVtcGRobnJtOThxbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/WRQBXSCnEFJIuxktnw/giphy.gif">
        <img class="animated-gif" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExMW5uNW5kMWM1b2hrd2d4M2p2ejJtMG4yMm9pMnJjMnBscmh6dXdkbCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/MFsqcBSoOKPbjtmvWz/giphy.gif">

      </div>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
